# GitLab CI/CD Pipeline Configuration Reference: https://docs.gitlab.com/ee/ci/yaml/

default:
  image: node:latest
  # https://docs.gitlab.com/ee/ci/caching/#caching-nodejs-dependencies
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

# https://docs.gitlab.com/ee/ci/yaml/#stages
stages:
  - build
  - test
  - deploy

.build:
  stage: build
  script:
    - yarn
    - yarn build
  artifacts:
    untracked: true

.deploy:
  stage: deploy
  script:
    - yarn deploy

.staging:
  variables:
    PUBLIC_URL: $STAGING_PUBLIC_URL
    GOOGLE_ANALYTICS_TRACKING_ID: $STAGING_GOOGLE_ANALYTICS_TRACKING_ID
    GOOGLE_OPTIMIZE_TRACKING_ID: $STAGING_GOOGLE_OPTIMIZE_TRACKING_ID
    GOOGLE_EXPERIMENT_ID: $STAGING_GOOGLE_EXPERIMENT_ID
    GOOGLE_OPTIMIZE_VARIATION_ID: $STAGING_GOOGLE_OPTIMIZE_VARIATION_ID
    GOOGLE_ANALYTICS_SAMPLE_RATE: $STAGING_GOOGLE_ANALYTICS_SAMPLE_RATE
    GOOGLE_ANALYTICS_SITE_SPEED_SAMPLE_RATE: $STAGING_GOOGLE_ANALYTICS_SITE_SPEED_SAMPLE_RATE
    GOOGLE_ANALYTICS_COOKIE_DOMAIN: $STAGING_GOOGLE_ANALYTICS_COOKIE_DOMAIN

.production:
  variables:
    PUBLIC_URL: $PRODUCTION_PUBLIC_URL
    GOOGLE_ANALYTICS_TRACKING_ID: $PRODUCTION_GOOGLE_ANALYTICS_TRACKING_ID
    GOOGLE_OPTIMIZE_TRACKING_ID: $PRODUCTION_GOOGLE_OPTIMIZE_TRACKING_ID
    GOOGLE_EXPERIMENT_ID: $PRODUCTION_GOOGLE_EXPERIMENT_ID
    GOOGLE_OPTIMIZE_VARIATION_ID: $PRODUCTION_GOOGLE_OPTIMIZE_VARIATION_ID
    GOOGLE_ANALYTICS_SAMPLE_RATE: $PRODUCTION_GOOGLE_ANALYTICS_SAMPLE_RATE
    GOOGLE_ANALYTICS_SITE_SPEED_SAMPLE_RATE: $PRODUCTION_GOOGLE_ANALYTICS_SITE_SPEED_SAMPLE_RATE
    GOOGLE_ANALYTICS_COOKIE_DOMAIN: $PRODUCTION_GOOGLE_ANALYTICS_COOKIE_DOMAIN

build_staging:
  extends:
    - .build
    - .staging
  except:
    - /^release.*$/

build_production:
  extends:
    - .build
    - .production
  only:
    - /^release.*$/

test:
  stage: test
  script:
    - yarn test
  artifacts:
    untracked: true

lint:
  stage: test
  script:
    - yarn lint
  artifacts:
    untracked: true

deploy_staging:
  extends:
    - .deploy
    - .staging
  # https://docs.gitlab.com/ee/ci/environments.html#defining-environments
  environment:
    name: staging
    url: $STAGING_PUBLIC_URL
  only:
    - master

deploy_production:
  extends:
    - .deploy
    - .production
  # https://docs.gitlab.com/ee/ci/environments.html#defining-environments
  environment:
    name: production
    url: $PRODUCTION_PUBLIC_URL
  only:
    - /^release.*$/
