version: "3"

services:
  mysql:
    image: mysql
    container_name: mysql
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE
    ports:
      - "3306:3306" # mysql
      - "33060:33060" # mysql x protocol
    command: --default-authentication-plugin=mysql_native_password
