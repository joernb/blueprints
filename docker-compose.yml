version: "3"

services:
  grafana:
    image: grafana/grafana:5.1.0
    container_name: grafana
    volumes:
      - "./grafana/provisioning:/etc/grafana/provisioning"
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD}"
    networks:
      - my-network

networks:
  my-network:
